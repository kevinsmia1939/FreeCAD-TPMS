<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="64"
   height="64"
   viewBox="0 0 64 64"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  <!-- Background grading lines/curves -->
  <path d="M 6,32 C 20,12 44,12 58,32" fill="none" stroke="url(#gradingGrad)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 6,40 C 20,24 44,24 58,40" fill="none" stroke="url(#gradingGrad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 6,48 C 20,36 44,36 58,48" fill="none" stroke="url(#gradingGrad)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Subelement Face highlighted on the left -->
  <rect x="4" y="8" width="6" height="48" rx="2" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  
  <!-- Grading indicator circles getting smaller -->
  <circle cx="20" cy="32" r="7" fill="#fbbf24"/>
  <circle cx="34" cy="32" r="5" fill="#f59e0b"/>
  <circle cx="46" cy="32" r="3.5" fill="#3b82f6"/>
  <circle cx="56" cy="32" r="2" fill="#1d4ed8"/>
</svg>
